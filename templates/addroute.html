<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='ticket.css') }}">
    <title>Add Route</title>
</head>
<body>
    <div class="container">
        <h2>Add a New Route</h2>
        <form method="POST" action="/add_route">
            <div class="form-group">
                <label for="source">Source:</label>
                <input type="text" id="source" name="source" required>
            </div>

            <div class="form-group">
                <label for="destination">Destination:</label>
                <input type="text" id="destination" name="destination" required>
            </div>

            <div class="form-group">
                <label for="distance">Distance:</label>
                <input type="text" id="distance" name="distance" required>
            </div>

            <div class="form-group">
                <label for="estimated_travel_time">Estimated Travel Time:</label>
                <input type="text" id="estimated_travel_time" name="estimated_travel_time" required>
            </div>

            <button type="submit" class="btn">Add Route</button>
        </form>
        <a href="/">Back to Home</a>
    </div>
</body>
</html>
